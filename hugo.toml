baseURL = 'https://v-681031.github.io/'
languageCode = 'zh-tw'
title = '影像實驗室'
theme = 'blowfish'

[params]
  # 開啟文章 UI
  [params.article]
    layoutWidth = "full" 
    showAuthor = true
    showDate = true
    showReadingTime = true

  # 確保首頁顯示 Recent 與卡片
  [params.homepage]
    showRecent = true
    mainSections = ["posts"]
    layout = "card"