baseURL = 'https://v-681031.github.io/'
languageCode = 'zh-tw'
title = '影像實驗室'
theme = 'blowfish'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[params]
  [params.article]
    layoutWidth = "wide"  # 改為 wide 以配合 gallery
    showAuthor = true
    showDate = true
    showReadingTime = true

  [params.homepage]
    showRecent = true
    mainSections = ["posts"]
    layout = "card"