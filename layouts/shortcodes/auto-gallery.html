<style>
  .auto-grid {
    /* 改用 Grid 佈局，這是最保險的 5 欄做法 */
    display: grid !important;
    grid-template-columns: repeat(5, 1fr) !important; /* 強制切成 5 等份 */
    gap: 10px !important; /* 欄位間距 */
    width: 100% !important;
    padding: 20px 0 !important;
  }
  
  .auto-grid-item {
    width: 100% !important;
    margin: 0 !important;
  }

  .auto-grid-item img {
    width: 100% !important;
    height: auto !important;
    aspect-ratio: 1 / 1 !important; /* 讓圖片統一成正方形，排版更整齊 */
    object-fit: cover !important; /* 避免圖片變形 */
    border-radius: 6px !important;
    display: block !important;
    transition: transform 0.3s ease !important;
    cursor: zoom-in;
  }

  .auto-grid-item img:hover {
    transform: scale(1.05);
    z-index: 5;
  }

  /* 響應式：如果螢幕太小（如手機），自動變成 2 欄，避免圖片太小 */
  @media (max-width: 768px) {
    .auto-grid {
      grid-template-columns: repeat(2, 1fr) !important;
    }
  }
</style>

<div class="auto-grid">
  {{ range .Page.Resources.ByType "image" }}
    <div class="auto-grid-item">
      {{ if (and (ne .MediaType.SubType "bmp") (ne .MediaType.SubType "x-ms-bmp")) }}
        {{ $thumbnail := .Resize "600x q85 webp" }}
        <img src="{{ $thumbnail.RelPermalink }}" class="medium-zoom-image" alt="影像測試" />
      {{ else }}
        <img src="{{ .RelPermalink }}" class="medium-zoom-image" alt="BMP 影像測試" />
      {{ end }}
    </div>
  {{ end }}
</div>
