{{ define "main" }}
<style>
html, body {
    margin: 0 !important;
    padding: 0 !important;
    background-color: #000000 !important;
    overflow: hidden !important;
}

#site-header, #site-footer, .main-menu,
header, footer, nav {
    display: none !important;
}

main, #main-content, .article-content, article {
    margin: 0 !important;
    padding: 0 !important;
    max-width: none !important;
    width: 100vw !important;
    height: 100vh !important;
}

.splash-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    user-select: none;
    -webkit-user-select: none;
}

.splash-wrapper img {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    -webkit-user-drag: none;
}

/* 不完全隱藏，留一點透明度讓 Safari 允許播放 */
#yt-player-container {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 2px;
    height: 2px;
    opacity: 0.01;
    pointer-events: none;
    z-index: -1;
}
</style>

<div class="splash-wrapper" id="splash-wrapper">
    <img src="/splash.jpg" alt="Splash" draggable="false">
</div>

<div id="yt-player-container">
    <div id="yt-player"></div>
</div>

<script>
(function() {
    var musicStarted = false;
    var playerReady = false;
    var player;

    // 載入 YouTube IFrame API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('yt-player', {
            height: '2',
            width: '2',
            videoId: 'JG6ZTOag12o',
            host: 'https://www.youtube-nocookie.com',
            playerVars: {
                'autoplay': 0,
                'controls': 0,
                'playsinline': 1,
                'rel': 0,
                'origin': window.location.origin,
                'enablejsapi': 1
            },
            events: {
                'onReady': function() {
                    playerReady = true;
                    console.log("[Splash] ✅ YouTube player ready");
                },
                'onError': function(e) {
                    console.error("[Splash] ❌ YouTube error code:", e.data);
                }
            }
        });
    };

    // 永遠封鎖的事件
    function blockAlways(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
    ['contextmenu', 'wheel', 'scroll', 'touchmove', 'dragstart', 'selectstart'].forEach(function(evt) {
        window.addEventListener(evt, blockAlways, { capture: true, passive: false });
    });

    function onFirstInteraction(e) {
        if (musicStarted) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        if (!playerReady || !player) {
            console.log("[Splash] ⏳ Player not ready yet, waiting...");
            return;
        }

        musicStarted = true;
        console.log("[Splash] 🎵 Triggering music");

        try {
            player.setVolume(100);
            player.playVideo();
        } catch (err) {
            console.error("[Splash] playVideo failed:", err);
        }

        // 40 秒全音量 → 7 秒淡出 → 3 秒靜止 → 跳轉
        setTimeout(function() {
            var currentVolume = 100;
            var fadeInterval = setInterval(function() {
                currentVolume -= 2;
                if (currentVolume <= 0) {
                    clearInterval(fadeInterval);
                    try { player.stopVideo(); } catch (err) {}
                    setTimeout(function() {
                        window.location.href = "/posts/";
                    }, 3000);
                } else {
                    try { player.setVolume(currentVolume); } catch (err) {}
                }
            }, 140); // 每 140ms 降 2，共 7 秒淡出
        }, 40000); // 40 秒後開始淡出
    }

    window.addEventListener('mousemove', onFirstInteraction, { capture: true });
    window.addEventListener('keydown', onFirstInteraction, { capture: true });
    window.addEventListener('click', onFirstInteraction, { capture: true });
    window.addEventListener('touchstart', onFirstInteraction, { capture: true, passive: false });
})();
</script>
{{ end }}
