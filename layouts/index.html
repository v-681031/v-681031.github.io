{{ define "main" }}
<style>
/* 全螢幕啟動頁 */
html, body {
    margin: 0 !important;
    padding: 0 !important;
    background-color: #000000 !important;
    overflow: hidden !important;
}

/* 隱藏 Blowfish 的 header / footer / 所有外層 */
#site-header,
#site-footer,
.main-menu,
header,
footer,
nav {
    display: none !important;
}

main, #main-content, .article-content, article {
    margin: 0 !important;
    padding: 0 !important;
    max-width: none !important;
    width: 100vw !important;
    height: 100vh !important;
}

.splash-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    /* 封鎖所有互動 */
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    cursor: none;
}

.splash-wrapper img {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    pointer-events: none;
    -webkit-user-drag: none;
}
</style>

<div class="splash-wrapper" id="splash-wrapper">
    <img src="/splash.jpg" alt="Splash" draggable="false">
</div>

<script>
(function() {
    var locked = true;

    // 封鎖所有滑鼠/鍵盤/觸控事件
    function blockEvent(e) {
        if (locked) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    }

    var events = [
        'click', 'dblclick', 'mousedown', 'mouseup',
        'contextmenu', 'wheel', 'scroll',
        'keydown', 'keyup', 'keypress',
        'touchstart', 'touchend', 'touchmove',
        'dragstart', 'selectstart'
    ];

    events.forEach(function(evt) {
        window.addEventListener(evt, blockEvent, { capture: true, passive: false });
        document.addEventListener(evt, blockEvent, { capture: true, passive: false });
    });

    // 5 秒後解除封鎖並跳轉
    setTimeout(function() {
        locked = false;
        window.location.href = "/posts/";
    }, 20000);
})();
</script>
{{ end }}
