{{ define "main" }}
<style>
html, body {
    margin: 0 !important;
    padding: 0 !important;
    background-color: #000000 !important;
    overflow: hidden !important;
}
#site-header, #site-footer, .main-menu,
header, footer, nav {
    display: none !important;
}
main, #main-content, .article-content, article {
    margin: 0 !important;
    padding: 0 !important;
    max-width: none !important;
    width: 100vw !important;
    height: 100vh !important;
}
.splash-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    user-select: none;
    -webkit-user-select: none;
}
.splash-wrapper img {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    -webkit-user-drag: none;
    opacity: 1;
}
#yt-player-container {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 2px;
    height: 2px;
    opacity: 0.01;
    pointer-events: none;
    z-index: -1;
}
</style>

<div class="splash-wrapper" id="splash-wrapper">
    <img src="/splash.jpg" alt="Splash" draggable="false" id="splash-img">
</div>

<div id="yt-player-container">
    <div id="yt-player"></div>
</div>

<script>
(function() {
    var musicStarted = false;
    var playerReady = false;
    var player;

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('yt-player', {
            height: '2',
            width: '2',
            videoId: 'JG6ZTOag12o',
            host: 'https://www.youtube-nocookie.com',
            playerVars: {
                'autoplay': 0,
                'controls': 0,
                'playsinline': 1,
                'rel': 0,
                'origin': window.location.origin,
                'enablejsapi': 1
            },
            events: {
                'onReady': function() {
                    playerReady = true;
                    console.log("[Splash] ✅ Player ready");
                },
                'onError': function(e) {
                    console.error("[Splash] ❌ Error:", e.data);
                }
            }
        });
    };

    function blockAlways(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
    ['contextmenu', 'wheel', 'scroll', 'touchmove', 'dragstart', 'selectstart'].forEach(function(evt) {
        window.addEventListener(evt, blockAlways, { capture: true, passive: false });
    });

    function onFirstInteraction(e) {
        if (musicStarted) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        if (!playerReady || !player) {
            console.log("[Splash] ⏳ Waiting...");
            return;
        }

        musicStarted = true;
        console.log("[Splash] 🎵 Start");

        try {
            player.setVolume(100);
            player.playVideo();
        } catch (err) {
            console.error("[Splash] playVideo failed:", err);
        }

        // +45 秒後開始淡出
        setTimeout(function() {
            console.log("[Splash] Fade out start (10s)");

            // 圖片用 JS 逐幀控制 opacity（100% 會漸變）
            var img = document.getElementById('splash-img');
            var fadeStart = performance.now();
            var fadeDuration = 10000; // 10 秒
            function fadeFrame(now) {
                var elapsed = now - fadeStart;
                var progress = Math.min(elapsed / fadeDuration, 1);
                img.style.opacity = String(1 - progress);
                if (progress < 1) {
                    requestAnimationFrame(fadeFrame);
                }
            }
            requestAnimationFrame(fadeFrame);

            // 音量同步淡出
            var currentVolume = 100;
            var fadeInterval = setInterval(function() {
                currentVolume -= 2;
                if (currentVolume <= 0) {
                    clearInterval(fadeInterval);
                    try { player.stopVideo(); } catch (err) {}
                    console.log("[Splash] Music stopped, 3s black pause");

                    // +55~+58 秒：全黑靜止 3 秒
                    setTimeout(function() {
                        try {
                            sessionStorage.setItem('fromSplash', '1');
                        } catch (err) {}
                        console.log("[Splash] Redirect → /posts/");
                        window.location.href = "/posts/";
                    }, 3000);
                } else {
                    try { player.setVolume(currentVolume); } catch (err) {}
                }
            }, 200);
        }, 45000);
    }

    window.addEventListener('mousemove', onFirstInteraction, { capture: true });
    window.addEventListener('keydown', onFirstInteraction, { capture: true });
    window.addEventListener('click', onFirstInteraction, { capture: true });
    window.addEventListener('touchstart', onFirstInteraction, { capture: true, passive: false });
})();
</script>
{{ end }}
