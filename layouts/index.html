{{ define "main" }}
<style>
/* 全螢幕啟動頁 */
html, body {
    margin: 0 !important;
    padding: 0 !important;
    background-color: #000000 !important;
    overflow: hidden !important;
}

/* 隱藏 Blowfish 的 header / footer / 所有外層 */
#site-header,
#site-footer,
.main-menu,
header,
footer,
nav {
    display: none !important;
}

main, #main-content, .article-content, article {
    margin: 0 !important;
    padding: 0 !important;
    max-width: none !important;
    width: 100vw !important;
    height: 100vh !important;
}

.splash-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999999;
}

.splash-wrapper img {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
}
</style>

<div class="splash-wrapper">
    <img src="/splash.jpg" alt="Splash">
</div>

<script>
setTimeout(function() {
    window.location.href = "/posts/";
}, 5000);
</script>
{{ end }}
